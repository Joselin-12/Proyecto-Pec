    <title>Contacto</title>

<body>

<header>
    <div class="container">

        <div class="logo">
            <a href="index.html">
                <img src="logotipo.jpeg" alt="">

        </div>

        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>

<!-- CONTACTO -->
<section class="contact-section">

    <h1>Contáctanos</h1>

        <!-- INFORMACIÓN -->
        

           
    
        <div class="contact-info">

            <div class="info-box">
                <span>📍</span>
                <p>Paraje ex vivero sn, San Antonino el Alto</p>
            </div>
            <div class="info-box">
                <span>✉️</span>
                <p> emsad35@cecyteo.edu.mx</p>
            </div>

            <div class="info-box">
                <span>📞</span>
                <p>+52 951 308 8031</p>
            </div>

           

            <div class="info-box">
                <span>🕒</span>
                <p>Lunes - Viernes | 7:00 AM - 3:00 PM</p>
            </div>

        </div>

        <!-- MAPA -->
        <div class="mapa">

            <iframe

                height="350" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy"

            </iframe>

        </div>

    </div>
    <a href="https://maps.google.com"
   target="_blank"
   class="map-btn">
   Ver ubicación completa
</a>

</section>

</body>

<script>
    const menuToggle = document.getElementById("menu-toggle");
    const nav = document.querySelector("nav");
    
    menuToggle.addEventListener("click", () => {
        nav.classList.toggle("active");
    });
